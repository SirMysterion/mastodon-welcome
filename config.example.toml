[mastodon]
base_url = "https://example.com"
access_token = "YOUR_ACCESS_TOKEN_HERE"
# Visibility options: public, unlisted, private, direct
# public = appears in local/public timelines (everyone sees welcome posts)
# unlisted = visible publicly but not in timelines (default)
visibility = "unlisted"

[database]
sqlite_path = "/data/database.db"

[[messages]]
content = """
Welcome to our instance!
"""

[[messages]]
content = """
Feel free to post an #introduction!
"""
content_warning = "Optional content warning"